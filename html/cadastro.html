<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Enviar sugestão de melhoria — Hotel Auto Posto Itaguari">
  <title>Sugerir Melhoria — Hotel Auto Posto Itaguari</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a6b15">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../icons/icon-192.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="tem-nav-inferior">

  <header class="cabecalho scrollado" style="position:relative;">
    <div class="container cabecalho-inner">
      <a href="index.html" class="logo"><img src="../assets/imagens/logo-hotel.jpg" alt="Hotel Auto Posto Itaguari"></a>
      <div class="cabecalho-acoes">
        <button id="btnTema" class="btn-tema" aria-label="Alternar tema">🌙</button>
      </div>
    </div>
  </header>

  <main class="pagina-cadastro">

    <div class="pagina-cadastro-header">
      <div class="secao-titulo">Sugerir Melhoria</div>
      <div class="linha-dourada" style="margin:0.75rem auto 0.5rem;"></div>
      <p style="color:var(--texto-claro);font-size:0.9rem;margin:0 auto;max-width:28rem;">
        Tem uma ideia para melhorar nosso site ou o hotel? Envie sua sugestão para o mural da comunidade.
      </p>
    </div>

    <div class="container" style="max-width:42rem;padding:0 1.25rem;">
      <div class="mensagem mensagem-info" style="margin-bottom:1rem;font-size:0.85rem;">
        💡 <strong>Dica:</strong> chacoalhe o celular para limpar todos os campos!
      </div>
    </div>

    <section class="secao-formulario">
      <div class="container" style="max-width:42rem;">
        <form class="form-container" id="formSugestao" novalidate>

          <div class="form-titulo">📋 Detalhes da Sugestão</div>
          <div id="mensagemSugestao"></div>

          <div class="form-grid">

            <div class="input-group" style="grid-column:1/-1;">
              <label for="sgNome">Seu Nome *</label>
              <input type="text" id="sgNome" name="sgNome"
                     placeholder="Ex: João Silva"
                     maxlength="50" required>
              <div class="contador-chars" id="contadorNome">0 / 50</div>
            </div>

            <div class="input-group" style="grid-column:1/-1;">
              <label for="sgTipo">Tipo de sugestão *</label>
              <select id="sgTipo" name="sgTipo" required>
                <option value="">Selecione uma categoria</option>
                <option value="Melhoria no Site">💻 Melhoria no Site</option>
                <option value="Melhoria no Hotel">🏨 Melhoria no Hotel</option>
                <option value="Novo Serviço">✨ Novo Serviço</option>
                <option value="Elogio">👏 Elogio</option>
                <option value="Reclamação">⚠️ Reclamação</option>
                <option value="Outro">💬 Outro</option>
              </select>
            </div>

            <div class="input-group" style="grid-column:1/-1;">
              <label for="sgMensagem">Sua Mensagem *</label>
              <textarea id="sgMensagem" name="sgMensagem"
                        placeholder="Descreva sua ideia ou sugestão com detalhes..."
                        maxlength="300" required></textarea>
              <div class="contador-chars" id="contadorDesc">0 / 300</div>
            </div>

          </div>

          <div style="margin-top:1.75rem;display:flex;flex-direction:column;gap:0.75rem;">
            <button type="submit" class="btn-enviar" id="btnEnviar">✓ Enviar Sugestão</button>
            <button type="button" class="btn-cancelar" id="btnLimpar" onclick="limparFormulario()">Limpar campos</button>
            <button type="button" class="btn-sensor" id="btnSensor">📳 Ativar sensor: chacoalhar para limpar</button>
          </div>

        </form>
      </div>
    </section>

  </main>

  <nav class="nav-inferior" aria-label="Navegação principal">
    <a href="index.html" class="nav-inferior-item">
      <span class="nav-inferior-icone">🏠</span>
      <span class="nav-inferior-texto">Início</span>
    </a>
    <a href="login.html?destino=cadastro" class="nav-inferior-item ativo">
      <span class="nav-inferior-icone">➕</span>
      <span class="nav-inferior-texto">Sugerir</span>
    </a>
    <a href="sobre.html" class="nav-inferior-item">
      <span class="nav-inferior-icone">ℹ️</span>
      <span class="nav-inferior-texto">Sobre</span>
    </a>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/dados.js"></script>
  <script src="../js/inicio.js"></script>

  <script>
    const CHAVE_SUGESTOES = 'villareal_sugestoes';

    function buscarSugestoes() {
      return JSON.parse(localStorage.getItem(CHAVE_SUGESTOES) || '[]');
    }

    async function salvarSugestao(dados) {
      const sugestoes = buscarSugestoes();
      const nova = { ...dados, id: 'sg' + Date.now(), data: new Date().toISOString() };
      sugestoes.unshift(nova);
      localStorage.setItem(CHAVE_SUGESTOES, JSON.stringify(sugestoes));
      if (window.db) {
        try {
          await window.db.collection('sugestoes').add({ ...nova, criadoEm: firebase.firestore.FieldValue.serverTimestamp() });
        } catch (e) {
          console.warn('Nuvem indisponível:', e.message);
        }
      }
      return nova;
    }

    function ativarContador(inputId, contadorId, max) {
      const input    = document.getElementById(inputId);
      const contador = document.getElementById(contadorId);
      if (!input || !contador) return;
      input.addEventListener('input', function () {
        const atual = input.value.length;
        contador.textContent = atual + ' / ' + max;
        contador.style.color = atual > max * 0.9 ? '#ef4444' : '';
      });
    }

    ativarContador('sgNome',      'contadorNome', 50);
    ativarContador('sgMensagem', 'contadorDesc', 300);

    window.limparFormulario = function() {
      document.getElementById('formSugestao').reset();
      document.getElementById('contadorNome').textContent      = '0 / 50';
      document.getElementById('contadorDesc').textContent      = '0 / 300';
      document.getElementById('mensagemSugestao').innerHTML    = '';
    }

    document.getElementById('formSugestao').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btnEnviar');
      const msg = document.getElementById('mensagemSugestao');

      const nome     = document.getElementById('sgNome').value.trim();
      const tipo     = document.getElementById('sgTipo').value;
      const mensagem = document.getElementById('sgMensagem').value.trim();

      if (!nome || !tipo || !mensagem) {
        msg.innerHTML = '<div class="mensagem mensagem-erro">Preencha todos os campos obrigatórios (*).</div>';
        return;
      }

      btn.disabled    = true;
      btn.textContent = '⏳ Enviando...';
      msg.innerHTML   = '';

      try {
        await salvarSugestao({ nome, tipo, mensagem });
        if (navigator.vibrate) navigator.vibrate([400, 150, 400, 150, 600]);
        msg.innerHTML = `
          <div class="mensagem mensagem-sucesso">
            ✅ <strong>Sugestão enviada com sucesso!</strong><br>
            <small>Sua ideia já aparece na página principal.</small>
          </div>`;
        setTimeout(function () {
          window.limparFormulario();
          setTimeout(function () { window.location.href = 'index.html#sugestoes'; }, 800);
        }, 2000);
      } catch (erro) {
        msg.innerHTML = `<div class="mensagem mensagem-erro">❌ Erro ao enviar: ${erro.message}</div>`;
      } finally {
        btn.disabled    = false;
        btn.textContent = '✓ Enviar Sugestão';
      }
    });
  </script>

</body>
</html>
